name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel previous in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prisma client generate
        # Web's tsc transitively imports types from @prisma/client; without
        # a generated client these resolve to `any` and TS doesn't catch
        # actual schema mismatches. Run before both typechecks.
        run: pnpm --filter @cityrnng/api prisma generate

      - name: Typecheck api
        run: pnpm --filter @cityrnng/api typecheck

      - name: Typecheck web
        run: pnpm --filter @cityrnng/web typecheck
