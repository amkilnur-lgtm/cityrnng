; Copy to config.ini next to scanner.py and fill in device_key.
; Any value can also be overridden by an env var CITYRNNG_<UPPERCASE_KEY>
; (handy for systemd EnvironmentFile so the key isn't world-readable).

[scanner]
; Site API base (no trailing /scan). Prod: https://cityrunning.online/api/v1
api_url = https://staging.cityrunning.online/api/v1

; The device key issued in Admin -> Сканеры (shown once at creation). REQUIRED.
device_key =

; hid    = USB scanner acting as a keyboard (types code + Enter)
; camera = USB webcam decoded with pyzbar
input_mode = hid

; For hid mode: pin the exact input device so codes don't leak to the console.
; Find it: ls -l /dev/input/by-id/  (pick the *-event-kbd for your scanner)
; Leave empty to read from stdin instead (fine for a quick manual test).
hid_device =

; For camera mode:
camera_index = 0

; Where unsent scans are buffered when the network is down.
buffer_path = /var/lib/cityrnng-scanner/outbox.jsonl

post_timeout_sec = 8
flush_interval_sec = 5
min_code_len = 3

; Optional GPIO feedback (BCM pin numbers). Leave empty to disable.
buzzer_pin =
led_ok_pin =
led_err_pin =
