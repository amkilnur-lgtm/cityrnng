services:
  postgres:
    image: postgres:16-alpine
    container_name: cityrnng-postgres
    environment:
      # Defaults match the dev .env so `docker compose up -d postgres redis`
      # without an env file still works. Production env files override these.
      POSTGRES_DB: ${POSTGRES_DB:-cityrnng}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # Bind to loopback only — Docker bypasses host ufw via its own iptables
    # rules, so a default `5432:5432` would expose Postgres to the internet
    # on any public-IP host. Container-to-container traffic still works via
    # the docker network (service name `postgres`).
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cityrnng-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # === App services — opt-in via `--profile app` so the dev flow
  # `docker compose up -d postgres redis` still works untouched.
  #
  # `image:` + `build:` together: `compose pull` fetches from GHCR (CI/CD
  # path), `compose up --build` builds locally from the Dockerfile (dev
  # path). Set IMAGE_TAG=sha-<commit> to pin a specific build; default
  # `latest` always works.
  api:
    profiles: ["app"]
    container_name: cityrnng-api
    image: ghcr.io/amkilnur-lgtm/cityrnng-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
    env_file:
      - ${APP_ENV_FILE:-.env}
    # Loopback only — Caddy on the host proxies 443 → here. Same reasoning as
    # postgres/redis: docker bypasses ufw, so a 0.0.0.0 bind would expose the
    # raw API to the public internet.
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped

  web:
    profiles: ["app"]
    container_name: cityrnng-web
    image: ghcr.io/amkilnur-lgtm/cityrnng-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* gets baked into the build; override per environment.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-}
    depends_on:
      - api
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      # Web's server-side and edge runtime report to the cityrnng-web Sentry
      # project; api container reports to cityrnng-api. They share env_file,
      # so we override SENTRY_DSN per service from a separate var.
      SENTRY_DSN: ${WEB_SENTRY_DSN:-}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
