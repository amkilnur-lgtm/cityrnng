services:
  postgres:
    image: postgres:16-alpine
    container_name: cityrnng-postgres
    environment:
      POSTGRES_DB: cityrnng
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cityrnng-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # === App services — opt-in via `--profile app` so the dev flow
  # `docker compose up -d postgres redis` still works untouched.
  api:
    profiles: ["app"]
    container_name: cityrnng-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
    env_file:
      - ${APP_ENV_FILE:-.env}
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    profiles: ["app"]
    container_name: cityrnng-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* gets baked into the build; override per environment.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    depends_on:
      - api
    env_file:
      - ${APP_ENV_FILE:-.env}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
